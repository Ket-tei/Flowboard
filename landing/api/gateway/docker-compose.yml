services:
  gateway:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./instances:/etc/nginx/instances:ro
    networks:
      - flowboard_gateway

networks:
  flowboard_gateway:
    external: true
    name: flowboard_gateway
